services:
  - type: web
    name: kisisel-notlar
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: kisisel-notlar-db
          property: connectionString

databases:
  - name: kisisel-notlar-db
    databaseName: kisisel_notlar
    user: kisisel_notlar_user
    plan: free
    region: frankfurt
